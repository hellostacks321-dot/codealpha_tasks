<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeAlpha | Premium Calculator</title>
  <link rel="stylesheet" href="calculator.css">
</head>
<body>
  <div class="calculator-container">
    <!-- Calculator Display Section -->
    <div class="calc-display">
      <div class="calc-history" id="calc-history" aria-live="polite"></div>
      <div class="calc-input" id="calc-input" aria-live="polite">0</div>
    </div>

    <!-- Calculator Input Pad -->
    <div class="calc-grid">
      <button class="btn btn-action" data-action="clear">AC</button>
      <button class="btn btn-action" data-action="delete">⌫</button>
      <button class="btn btn-action" data-action="percentage">%</button>
      <button class="btn btn-operator" data-op="/">÷</button>

      <button class="btn btn-num" data-val="7">7</button>
      <button class="btn btn-num" data-val="8">8</button>
      <button class="btn btn-num" data-val="9">9</button>
      <button class="btn btn-operator" data-op="*">×</button>

      <button class="btn btn-num" data-val="4">4</button>
      <button class="btn btn-num" data-val="5">5</button>
      <button class="btn btn-num" data-val="6">6</button>
      <button class="btn btn-operator" data-op="-">−</button>

      <button class="btn btn-num" data-val="1">1</button>
      <button class="btn btn-num" data-val="2">2</button>
      <button class="btn btn-num" data-val="3">3</button>
      <button class="btn btn-operator" data-op="+">+</button>

      <button class="btn btn-num span-two" data-val="0">0</button>
      <button class="btn btn-num" data-val=".">.</button>
      <button class="btn btn-equals" data-action="evaluate">=</button>
    </div>
  </div>
  <script src="calculator.js"></script>
</body>
</html>
